name: Gradle Test

inputs:
  fdb_version:
    description: 'Version of FDB to run'
    required: false
    default: "7.3.42"
  gradle_command:
    description: 'Gradle command to run'
    default: build destructiveTest
    required: false
  gradle_args:
    description: 'Gradle arguments for running'
    required: true
  report_name:
    description: 'Test report artifact name'
    required: false
    default: "test-reports"

runs:
  using: "composite"
  steps:
  - name: Run build and test
    uses: ./actions/run-gradle
    with:
      gradle_command: ${{ inputs.gradle_command }} -PcoreNotStrict -Ptests.ci=true ${{ inputs.gradle_args }}
  - name: Test Summary
    shell: bash
    if: ${{ !cancelled() && hashFiles('.out/reports/test-summary.md') != '' }}
    run: cat .out/reports/test-summary.md > $GITHUB_STEP_SUMMARY
  - name: Test Failures
    shell: bash
    if: ${{ !cancelled() && hashFiles('.out/reports/test-failures.md') != '' }}
    run: cat .out/reports/test-failures.md > $GITHUB_STEP_SUMMARY
  - name: Copy Test Reports
    shell: bash
    if: ${{ !cancelled() }}
    run: |
       mkdir -p test-reports
       for d in relationaldbx-java-annotations relationaldbx-extensions relationaldbx-test-utils relationaldbx-core relationaldbx-icu relationaldbx-spatial relationaldbx-lucene relationaldbx-jmh examples relationaldbx-relational-api relationaldbx-relational-core relationaldbx-relational-cli relationaldbx-relational-grpc relationaldbx-relational-jdbc relationaldbx-relational-server yaml-tests; do
         if [[ -d "$d/.out/reports" ]] ; then
           ln -s "../$d/.out/reports" "test-reports/$d"
         fi
       done
  - name: Overall failure
    if: ${{ failure() }}
    shell: bash
    run: |
      echo "FAILURE" >> test-reports/overall.txt
  - name: Overall success
    if: ${{ success() }}
    shell: bash
    run: |
      echo "SUCCESS" >> test-reports/overall.txt
  - name: Publish Test Reports
    if: ${{ !cancelled() }}
    uses: actions/upload-artifact@v7.0.1
    with:
      name: ${{ inputs.report_name }}
      if-no-files-found: ignore
      path: |
            test-reports/relationaldbx-java-annotations/
            test-reports/relationaldbx-extensions/
            test-reports/relationaldbx-test-utils/
            test-reports/relationaldbx-core/
            test-reports/relationaldbx-icu/
            test-reports/relationaldbx-spatial/
            test-reports/relationaldbx-lucene/
            test-reports/relationaldbx-jmh/
            test-reports/examples/
            test-reports/relationaldbx-relational-api/
            test-reports/relationaldbx-relational-core/
            test-reports/relationaldbx-relational-cli/
            test-reports/relationaldbx-relational-grpc/
            test-reports/relationaldbx-relational-jdbc/
            test-reports/relationaldbx-relational-server/
            test-reports/yaml-tests/
            test-reports/overall.txt
